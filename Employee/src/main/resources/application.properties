spring.application.name=employee-management-system

# MongoDB (from Render environment variable)
spring.data.mongodb.uri=${MONGO_URI:${MONGODB_URI:${SPRING_DATA_MONGODB_URI}}}
spring.data.mongodb.auto-index-creation=true

# Server (Render will inject PORT automatically)
server.port=${PORT:8080}
server.address=0.0.0.0

# JWT Configuration (from environment variables)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS (set frontend URL from Render env)
app.cors.allowed-origins=${CORS_ORIGINS:https://employee-manager-orcin.vercel.app,http://localhost:5173,http://localhost:3000}

# Silence a harmless Spring Security warning for the custom authentication provider setup
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR